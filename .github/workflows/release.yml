name: release

# Tag-driven release: pushing `v*.*.*` builds an Arch package inside
# an `archlinux:latest` container and uploads it as a GitHub Release
# asset. No AUR push yet — that's a manual follow-up once we settle
# on a packaging cadence.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.0.1)"
        required: true

jobs:
  arch-package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Install build dependencies
        # `makepkg` refuses to run as root, so we create a builder
        # user. The full dep list mirrors the PKGBUILD's
        # depends + makedepends.
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git sudo rsync \
            rust cargo pnpm nodejs pkgconf \
            libratbag webkit2gtk-4.1 gtk3 glib2 libsoup3 dbus

      - name: Create unprivileged builder user
        run: |
          useradd -m -G wheel builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hand the checkout to the builder user
        run: chown -R builder:builder .

      - name: Stamp PKGBUILD pkgver from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # workflow_dispatch supplies the tag via input.
          if [[ -z "${TAG}" || "${TAG}" == "${GITHUB_REF}" ]]; then
            TAG='${{ github.event.inputs.tag }}'
          fi
          VERSION="${TAG#v}"
          echo "Stamping pkgver=${VERSION}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/arch/PKGBUILD

      - name: Build package
        run: |
          cd packaging/arch
          sudo -u builder makepkg -s --noconfirm --noprogressbar

      - name: Locate built artifact
        id: artifact
        run: |
          pkg=$(ls packaging/arch/*.pkg.tar.zst | head -n 1)
          echo "path=${pkg}" >> "${GITHUB_OUTPUT}"
          echo "Found: ${pkg}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true

      - name: Upload as workflow artifact (for workflow_dispatch runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: gamerat-arch-package
          path: ${{ steps.artifact.outputs.path }}
