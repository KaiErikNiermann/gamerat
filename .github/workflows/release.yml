name: release

# Tag-driven release pipeline. Pushing `v*.*.*` (or invoking
# workflow_dispatch with a tag) builds four package artifacts —
# .pkg.tar.zst (Arch), .deb (Debian/Ubuntu), .rpm (Fedora), and a
# generic binary tarball — smoke-tests each in a fresh container of
# its target distro, and publishes them to a GitHub Release with
# auto-generated notes. An AUR push job is wired in but no-ops until
# the AUR_SSH_PRIVATE_KEY secret is configured.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

# Strip LTO from CFLAGS at the workflow level so cc-rs's sqlite3.c
# compile (via rusqlite's `bundled` feature) doesn't emit LLVM
# bitcode incompatible with rust-lld. Mirrors the Arch
# `options=(!lto)` workaround for every build target.
env:
  CFLAGS: ""
  CXXFLAGS: ""

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Derive the version string once. Every downstream build job
  # checks out independently and re-runs scripts/stamp-version.sh
  # with this output, so the version baked into Cargo.toml +
  # PKGBUILD is identical across artifacts.
  # ─────────────────────────────────────────────────────────────────
  stamp-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
    steps:
      - id: derive
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Derived version: ${VERSION}"

  # ─────────────────────────────────────────────────────────────────
  # build-arch — Arch .pkg.tar.zst via makepkg.
  # ─────────────────────────────────────────────────────────────────
  build-arch:
    needs: stamp-version
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git sudo rsync \
            rust cargo pnpm nodejs pkgconf \
            libratbag webkit2gtk-4.1 gtk3 glib2 libsoup3 dbus

      - name: Create unprivileged builder user
        # makepkg refuses to run as root.
        run: |
          useradd -m -G wheel builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Stamp version
        run: bash scripts/stamp-version.sh "${{ needs.stamp-version.outputs.version }}"

      - name: Hand the checkout to the builder user
        run: chown -R builder:builder .

      - name: Build package
        run: |
          cd packaging/arch
          sudo -u builder makepkg -s --noconfirm --noprogressbar

      - name: Locate artifact
        id: artifact
        run: |
          pkg=$(ls packaging/arch/*.pkg.tar.zst | grep -v debug | head -n 1)
          cp "${pkg}" "/tmp/$(basename ${pkg})"
          echo "path=/tmp/$(basename ${pkg})" >> "${GITHUB_OUTPUT}"
          echo "Found: ${pkg}"

      - uses: actions/upload-artifact@v7
        with:
          name: gamerat-arch
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # build-deb — Debian/Ubuntu .deb via cargo-deb.
  # Built in debian:trixie: needs libwebkit2gtk-4.1-dev which lands
  # cleanly there. Glibc floor is therefore 2.39 (Debian 13+, Ubuntu
  # 24.04+, Fedora 40+). Older targets need the binary tarball or a
  # source rebuild.
  # ─────────────────────────────────────────────────────────────────
  build-deb:
    needs: stamp-version
    runs-on: ubuntu-latest
    container: debian:trixie

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          # libudev-dev satisfies libudev-sys (transitive evdev/udev
          # dep of gamerat-input). libratbag-dev was previously listed
          # here but isn't actually needed: gamerat talks to ratbagd
          # over D-Bus via zbus, no FFI into the C library — and Debian
          # doesn't even ship libratbag-dev as a separate binary.
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential pkg-config git \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libssl-dev \
            libudev-dev nodejs npm
          # pnpm via npm (Debian's pnpm package lags behind significantly).
          npm install -g pnpm@10

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - uses: actions/checkout@v6

      - name: Stamp version
        run: bash scripts/stamp-version.sh "${{ needs.stamp-version.outputs.version }}"

      - name: Build frontend (Vite)
        run: |
          cd crates/gamerat-gui
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build workspace (release, GUI excluded)
        run: cargo build --release --workspace --exclude gamerat-gui

      - name: Build GUI (release)
        run: cargo build --release -p gamerat-gui

      - name: Assemble .deb
        run: cargo deb -p gamerat-daemon --no-build

      - uses: actions/upload-artifact@v7
        with:
          name: gamerat-deb
          path: target/debian/*.deb
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # build-rpm — Fedora .rpm via cargo-generate-rpm.
  # ─────────────────────────────────────────────────────────────────
  build-rpm:
    needs: stamp-version
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - name: Install build dependencies
        run: |
          # systemd-devel provides libudev headers for the udev/evdev
          # transitive build dep. libratbag-devel was previously listed
          # here but gamerat doesn't actually link against the C
          # library — same reasoning as build-deb above. Pinning to
          # fedora:43 because F44 doesn't have libratbag rebuilt yet
          # (Bodhi tops out at libratbag-0.18-3.fc43); the package is
          # listed in the cargo-generate-rpm `requires` at install
          # time, not build time, but using a Fedora version that
          # actually ships libratbag keeps the runtime smoke check
          # honest.
          dnf install -y \
            curl ca-certificates @development-tools git pkgconf \
            webkit2gtk4.1-devel gtk3-devel libsoup3-devel openssl-devel \
            systemd-devel nodejs npm
          npm install -g pnpm@10

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - uses: actions/checkout@v6

      - name: Stamp version
        run: bash scripts/stamp-version.sh "${{ needs.stamp-version.outputs.version }}"

      - name: Build frontend (Vite)
        run: |
          cd crates/gamerat-gui
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build workspace (release, GUI excluded)
        run: cargo build --release --workspace --exclude gamerat-gui

      - name: Build GUI (release)
        run: cargo build --release -p gamerat-gui

      - name: Assemble .rpm
        # cargo-generate-rpm's -p takes a path to the crate dir, not
        # a package name — despite what `--help` claims. Pass the
        # workspace-relative path.
        run: cargo generate-rpm -p crates/gamerat-daemon

      - uses: actions/upload-artifact@v7
        with:
          name: gamerat-rpm
          path: target/generate-rpm/*.rpm
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # build-tarball — generic binary tarball.
  # Built in debian:trixie (same reasoning as build-deb — glibc 2.39
  # floor). Webkit2gtk-4.1 stays the runtime requirement; install.sh
  # prints a hint when extracted to a non-standard prefix.
  # ─────────────────────────────────────────────────────────────────
  build-tarball:
    needs: stamp-version
    runs-on: ubuntu-latest
    container: debian:trixie

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          # See build-deb for why libratbag-dev is out + libudev-dev is in.
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential pkg-config git \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libssl-dev \
            libudev-dev nodejs npm
          npm install -g pnpm@10

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain stable --profile minimal
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - uses: actions/checkout@v6

      - name: Stamp version
        run: bash scripts/stamp-version.sh "${{ needs.stamp-version.outputs.version }}"

      - name: Build frontend (Vite)
        run: |
          cd crates/gamerat-gui
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build workspace (release, GUI excluded)
        run: cargo build --release --workspace --exclude gamerat-gui

      - name: Build GUI (release)
        run: cargo build --release -p gamerat-gui

      - name: Assemble tarball
        run: bash scripts/build-tarball.sh "${{ needs.stamp-version.outputs.version }}"

      - uses: actions/upload-artifact@v7
        with:
          name: gamerat-tarball
          path: gamerat-*-x86_64-linux.tar.gz
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # Per-distro install-smoke. Each job downloads its sibling build's
  # artifact, installs it via the native package manager, and runs
  # scripts/install-smoke.sh (static + session-bus probe).
  # ─────────────────────────────────────────────────────────────────
  smoke-arch:
    needs: build-arch
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: gamerat-arch, path: . }
      - name: Install smoke deps
        run: |
          pacman -Syu --noconfirm
          # libxml2 → xmllint; desktop-file-utils → desktop-file-validate.
          # dbus provides dbus-run-session + busctl. dbus-broker is
          # the modern default broker on Arch; either works.
          pacman -S --noconfirm --needed \
            libxml2 desktop-file-utils dbus dbus-broker systemd \
            libratbag webkit2gtk-4.1 gtk3 libsoup3
      - name: Smoke
        run: bash scripts/install-smoke.sh

  smoke-deb:
    needs: build-deb
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # debian:bookworm intentionally omitted — glibc 2.36 there is
        # below the build-deb floor (trixie ships glibc 2.39). Users on
        # bookworm need the binary tarball, a source rebuild, or to
        # wait for a bookworm-backports build.
        image:
          - debian:trixie
          - ubuntu:24.04
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: gamerat-deb, path: . }
      - name: Install smoke deps
        run: |
          apt-get update
          # libxml2-utils → xmllint; desktop-file-utils →
          # desktop-file-validate; dbus → dbus-run-session + busctl.
          apt-get install -y --no-install-recommends \
            libxml2-utils desktop-file-utils dbus systemd
      - name: Smoke
        run: bash scripts/install-smoke.sh

  smoke-rpm:
    needs: build-rpm
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: gamerat-rpm, path: . }
      - name: Install smoke deps
        run: |
          # libxml2 → xmllint; desktop-file-utils →
          # desktop-file-validate; dbus-daemon provides
          # dbus-run-session (NOT dbus-tools, which is just clients);
          # dbus-tools provides busctl.
          dnf install -y \
            libxml2 desktop-file-utils dbus-daemon dbus-tools systemd
      - name: Smoke
        run: bash scripts/install-smoke.sh

  # ─────────────────────────────────────────────────────────────────
  # gh-release — collect everything, hash, publish.
  # Gated on smoke jobs passing so a broken artifact never reaches
  # the Release.
  # ─────────────────────────────────────────────────────────────────
  gh-release:
    needs: [smoke-arch, smoke-deb, smoke-rpm, build-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ─────────────────────────────────────────────────────────────────
  # aur-publish — push the stamped PKGBUILD to the AUR repo. No-ops
  # until AUR_SSH_PRIVATE_KEY is configured: GitHub's `if:` syntax
  # can't reference secrets directly, so we go through an output
  # step that surfaces a public truthy value.
  # ─────────────────────────────────────────────────────────────────
  aur-publish:
    needs: [gh-release, stamp-version]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - name: Check for AUR secret
        id: secret-check
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "${AUR_KEY}" ]; then
            echo "have_key=true" >> "${GITHUB_OUTPUT}"
          else
            echo "have_key=false" >> "${GITHUB_OUTPUT}"
            echo "AUR_SSH_PRIVATE_KEY not configured; skipping AUR push."
          fi
      - name: Stamp PKGBUILD
        if: steps.secret-check.outputs.have_key == 'true'
        run: bash scripts/stamp-version.sh "${{ needs.stamp-version.outputs.version }}"
      - name: Publish to AUR
        if: steps.secret-check.outputs.have_key == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: gamerat
          pkgbuild: packaging/arch/PKGBUILD
          assets: |
            packaging/arch/gamerat.install
          commit_username: github-actions
          commit_email: github-actions@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release v${{ needs.stamp-version.outputs.version }}"
          ssh_keyscan_types: rsa,ed25519
