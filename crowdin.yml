# Crowdin configuration for the gamerat GUI localization.
#
# The English catalog is the source of truth; Crowdin produces one
# translation file per locale next to it. Set CROWDIN_PROJECT_ID and
# CROWDIN_PERSONAL_TOKEN in the environment, then:
#
#     crowdin upload sources       # push messages/en.json strings
#     crowdin download             # pull translations back as messages/<code>.json
#
# Adding a language: add its code to
# crates/gamerat-gui/project.inlang/settings.json `locales`, drop in
# messages/<code>.json, AND add a `languages_mapping.two_letters_code`
# entry below mapping the Crowdin language id -> that exact code. The
# Paraglide compiler (vite plugin / `pnpm messages`) then emits the typed
# m.*() functions and falls back to English for any not-yet-translated key.
#
# Note: the inlang message files carry a leading "$schema" key (a URL, not
# UI copy). Mark it non-translatable in the Crowdin project settings (or via
# a translatable_elements filter) so translators don't see it as a string.

preserve_hierarchy: true

files:
  - source: /crates/gamerat-gui/messages/en.json
    translation: /crates/gamerat-gui/messages/%two_letters_code%.json
    # Pin each Crowdin language to the *exact* inlang locale code Paraglide
    # expects as the filename (messages/<code>.json). Bare %two_letters_code%
    # is ambiguous for languages that share an ISO-639-1 code (pt-BR / pt-PT
    # → "pt"), which Crowdin flags as a wrong export pattern; explicit
    # mapping makes every target's filename deterministic and unique.
    languages_mapping:
      two_letters_code:
        de: de
